global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'spring_boot_student_app'
    metrics_path: '/student/actuator/prometheus'
    static_configs:
      - targets: ['192.168.49.2:30089']
        labels:
          application: 'student-management'

  - job_name: 'jenkins'
    metrics_path: '/prometheus/'
    static_configs:
      - targets: ['10.0.2.15:8080']